name: API CI

on:
  pull_request:
    branches:
      - main
    paths:
      - checkpointd-api/**
      - .github/workflows/api-ci.yml
      - .gitattributes
  push:
    branches:
      - main
    paths:
      - checkpointd-api/**
      - .github/workflows/api-ci.yml
      - .gitattributes
  workflow_dispatch:

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: checkpointd-api

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run tests
        run: ./mvnw -B clean test
