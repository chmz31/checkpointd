spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:checkpointd}}
    username: ${POSTGRES_USER:checkpointd}
    password: ${POSTGRES_PASSWORD:change-me}

checkpointd:
  integrations:
    igdb:
      base-url: ${IGDB_BASE_URL:https://api.igdb.com/v4}
      twitch-token-url: ${TWITCH_TOKEN_URL:https://id.twitch.tv/oauth2/token}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
